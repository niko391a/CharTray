
name: Build and release

on:
  push:
    tags:
      - 'v*'

jobs:
  build_windows:
    name: Build Windows executable
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pystray pillow pyperclip keyboard pyinstaller

      - name: Build exe
        run: python -m PyInstaller --onefile --windowed --name CharTray --hidden-import pystray._win32 chartray.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CharTray-exe
          path: dist/CharTray.exe

  github_release:
    name: Create GitHub release
    needs: build_windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -1)
          echo "tag=$PREV" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        if: steps.prev_tag.outputs.tag != ''
        uses: github/copilot-release-notes@main
        with:
          base-ref: ${{ steps.prev_tag.outputs.tag }}
          head-ref: ${{ github.ref_name }}
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

      - name: Download exe artifact
        uses: actions/download-artifact@v4
        with:
          name: CharTray-exe
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.release-notes }}
          generate_release_notes: ${{ steps.prev_tag.outputs.tag == '' }}
          files: dist/CharTray.exe
          token: ${{ secrets.GITHUB_TOKEN }}
