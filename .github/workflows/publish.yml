
name: Create release

on:
  push:
    tags:
      - 'v*'

jobs:
  build_windows:
    name: Build Windows executable
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pystray pillow pyperclip keyboard pyinstaller

      - name: Build exe
        run: python -m PyInstaller --onefile --windowed --name CharTray --hidden-import pystray._win32 chartray.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CharTray-exe
          path: dist/CharTray.exe

  github_release:
    name: Create GitHub release
    needs: build_windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download exe artifact
        uses: actions/download-artifact@v4
        with:
          name: CharTray-exe
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/CharTray.exe
          token: ${{ secrets.GITHUB_TOKEN }}
